name: SehatKu CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/sehatku-frontend
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/sehatku-backend

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build & Push Docker Images
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Deploy ke EC2
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== SehatKu Deploy $(date) ==="

            # Login ke GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull images terbaru
            docker pull ${{ env.IMAGE_FRONTEND }}:latest
            docker pull ${{ env.IMAGE_BACKEND }}:latest

            # Buat folder project jika belum ada
            mkdir -p ~/sehatku

            # Copy docker-compose dan env
            cat > ~/sehatku/docker-compose.yml << 'COMPOSE'
            version: '3.8'
            services:
              frontend:
                image: ${{ env.IMAGE_FRONTEND }}:latest
                container_name: sehatku-frontend
                ports:
                  - "80:80"
                depends_on:
                  - backend
                networks:
                  - sehatku-net
                restart: unless-stopped

              backend:
                image: ${{ env.IMAGE_BACKEND }}:latest
                container_name: sehatku-backend
                ports:
                  - "5000:5000"
                env_file:
                  - .env
                networks:
                  - sehatku-net
                restart: unless-stopped

            networks:
              sehatku-net:
                driver: bridge
            COMPOSE

            # Buat file .env dari secrets
            cat > ~/sehatku/.env << ENV
            DB_HOST=${{ secrets.DB_HOST }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_NAME=sehatku
            AWS_REGION=${{ secrets.AWS_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=production
            ENV

            # Restart containers
            cd ~/sehatku
            docker compose down --remove-orphans
            docker compose up -d

            # Verifikasi
            sleep 10
            docker compose ps
            echo "=== Deploy Selesai ==="
